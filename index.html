<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matemaatika Sprint - 3. Klass</title>
    <style>
        :root {
            --primary: #4a6fa5;
            --success: #2ec4b6;
            --danger: #e71d36;
            --warning: #ff9f1c;
            --bg: #f6f8fa;
            --dark: #011627;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        .game-container {
            background: white;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            max-width: 420px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            border: 4px solid #e2e8f0;
        }

        h1 {
            color: var(--primary);
            margin-top: 0;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #f1f5f9;
            padding: 10px 15px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 20px;
        }

        .stat-val {
            color: var(--dark);
        }

        .question-box {
            font-size: 46px;
            font-weight: 800;
            margin: 30px 0;
            color: var(--dark);
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            border-radius: 16px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }

        button.btn-opt {
            background: white;
            color: var(--dark);
            border: 3px solid #cbd5e1;
            padding: 18px 10px;
            font-size: 22px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.15s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        button.btn-opt:active {
            transform: scale(0.96);
        }

        button.btn-opt.correct {
            background-color: var(--success) !important;
            border-color: var(--success) !important;
            color: white !important;
        }

        button.btn-opt.wrong {
            background-color: var(--danger) !important;
            border-color: var(--danger) !important;
            color: white !important;
        }

        .start-screen, .end-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 10px rgba(74, 111, 165, 0.3);
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #3a5d8c;
        }

        .badge {
            font-size: 60px;
            margin: 10px 0;
        }

        .highscore-text {
            font-size: 14px;
            color: var(--warning);
            background: #fffbeb;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #fef3c7;
            font-weight: 600;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="start-screen" class="start-screen">
            <h1>Matemaatika Sprint ⚡</h1>
            <p style="color: #64748b; font-size: 16px; margin-bottom: 10px;">Korrutamine ja jagamine 100 piires ning kümnete/sajalistega. 20 kiiret küsimust!</p>
            <div id="global-highscore" class="highscore-text hidden"></div>
            <button class="action-btn" onclick="startGame()">Alusta seiklust!</button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="stats-bar">
                <div>Küsimus: <span id="progress" class="stat-val">1/20</span></div>
                <div>Aeg: <span id="timer" class="stat-val">0.0s</span></div>
                <div>Õigeid: <span id="score-counter" class="stat-val">0</span></div>
            </div>
            
            <div class="question-box" id="question">--</div>
            
            <div class="options-grid">
                <button class="btn-opt" onclick="checkAnswer(this, 0)" id="opt0">--</button>
                <button class="btn-opt" onclick="checkAnswer(this, 1)" id="opt1">--</button>
                <button class="btn-opt" onclick="checkAnswer(this, 2)" id="opt2">--</button>
                <button class="btn-opt" onclick="checkAnswer(this, 3)" id="opt3">--</button>
            </div>
        </div>

        <div id="end-screen" class="end-screen hidden">
            <h1>Tulemus käes!</h1>
            <div id="badge" class="badge">🏆</div>
            <p style="font-size: 20px; font-weight: 700; margin: 5px 0;" id="end-score-text"></p>
            <p style="font-size: 16px; color: #475569; margin: 0 0 15px 0;" id="end-time-text"></p>
            <div id="new-record-msg" style="color: var(--success); font-weight: bold; margin-bottom: 10px;" class="hidden">🎉 UUS ISIKLIK REKORD! 🎉</div>
            <button class="action-btn" onclick="startGame()">Mängi uuesti</button>
        </div>
    </div>

    <script>
        const TOTAL_QUESTIONS = 20;
        let currentQuestion = 0;
        let correctAnswersCount = 0;
        let timerInterval;
        let startTime;
        let currentCorrectAnswer = 0;
        let canAnswer = true;

        // Laadi esilehel parim tulemus
        window.onload = function() {
            showGlobalHighScore();
        };

        function showGlobalHighScore() {
            const hs = localStorage.getItem('mathSprintHighScore');
            const hsBox = document.getElementById('global-highscore');
            if (hs) {
                hsBox.innerText = `Sinu kiireim 100% tulemus: ${parseFloat(hs).toFixed(1)} sekundit!`;
                hsBox.classList.remove('hidden');
            } else {
                hsBox.classList.add('hidden');
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            currentQuestion = 0;
            correctAnswersCount = 0;
            canAnswer = true;
            document.getElementById('score-counter').innerText = "0";
            
            startTime = performance.now();
            timerInterval = setInterval(updateTimer, 100);
            
            nextQuestion();
        }

        function updateTimer() {
            const elapsed = (performance.now() - startTime) / 1000;
            document.getElementById('timer').innerText = elapsed.toFixed(1) + 's';
        }

        function generateQuestion() {
            // 4 tüüpi ülesandeid võrdse tõenäosusega
            const type = Math.floor(Math.random() * 4);
            let text = "";
            let ans = 0;

            if (type === 0) { 
                // Tavaline korrutamine (2x2 kuni 10x10)
                const a = Math.floor(Math.random() * 9) + 2;
                const b = Math.floor(Math.random() * 9) + 2;
                text = `${a} × ${b}`;
                ans = a * b;
            } else if (type === 1) { 
                // Tavaline jagamine (vastus 2 kuni 10)
                const b = Math.floor(Math.random() * 9) + 2;
                const expected = Math.floor(Math.random() * 9) + 2;
                const a = b * expected;
                text = `${a} ÷ ${b}`;
                ans = expected;
            } else if (type === 2) { 
                // Kümnete ja sajaliste korrutamine
                const subType = Math.random() > 0.5;
                if (subType) { // Kümnetega (nt 3 x 20 või 40 x 2)
                    const a = Math.floor(Math.random() * 4) + 2; // 2..5
                    const b = (Math.floor(Math.random() * 5) + 1) * 10; // 10,20,30,40,50
                    if (Math.random() > 0.5) {
                        text = `${a} × ${b}`;
                    } else {
                        text = `${b} × ${a}`;
                    }
                    ans = a * b;
                } else { // Sajalistega (nt 2 x 400 või 300 x 3)
                    const a = Math.floor(Math.random() * 3) + 2; // 2..4
                    const b = (Math.floor(Math.random() * 3) + 1) * 100; // 100,200,300
                    if (Math.random() > 0.5) {
                        text = `${a} × ${b}`;
                    } else {
                        text = `${b} × ${a}`;
                    }
                    ans = a * b;
                }
            } else { 
                // Kümnete ja sajaliste jagamine
                const subType = Math.random() > 0.5;
                if (subType) { // Kümnete jagamine (nt 80 ÷ 2 või 150 ÷ 3)
                    const expected = (Math.floor(Math.random() * 5) + 1) * 10; // 10..50
                    const b = Math.floor(Math.random() * 3) + 2; // 2..4
                    const a = expected * b;
                    text = `${a} ÷ ${b}`;
                    ans = expected;
                } else { // Sajaliste jagamine (nt 600 ÷ 3 või 800 ÷ 4)
                    const expected = (Math.floor(Math.random() * 4) + 1) * 100; // 100..400
                    const b = Math.floor(Math.random() * 2) + 2; // 2..3
                    const a = expected * b;
                    text = `${a} ÷ ${b}`;
                    ans = expected;
                }
            }
            return { text, ans };
        }

        function generateOptions(correct) {
            const opts = new Set([correct]);
            let step = 1;
            if (correct >= 100) step = 100;
            else if (correct >= 10 && correct % 10 === 0) step = 10;

            while (opts.size < 4) {
                let modifier = (Math.floor(Math.random() * 7) - 3); // -3 kuni +3
                if (modifier === 0) continue;
                
                let fake = correct + (modifier * step);
                // Vahel teeme klassikalise lohakusvea (unustame nulli või paneme juurde)
                if (Math.random() > 0.8 && correct >= 10) {
                    fake = Math.random() > 0.5 ? correct * 10 : correct / 10;
                }

                if (fake > 0 && fake !== correct && !opts.has(fake)) {
                    opts.add(fake);
                }
            }
            return Array.from(opts).sort(() => Math.random() - 0.5);
        }

        function nextQuestion() {
            canAnswer = true;
            currentQuestion++;
            document.getElementById('progress').innerText = `${currentQuestion}/${TOTAL_QUESTIONS}`;
            
            // Puhasta nupu stiilid
            for(let i=0; i<4; i++) {
                const btn = document.getElementById(`opt${i}`);
                btn.className = "btn-opt";
            }

            const qData = generateQuestion();
            document.getElementById('question').innerText = qData.text;
            currentCorrectAnswer = qData.ans;

            const options = generateOptions(qData.ans);
            for(let i=0; i<4; i++) {
                const btn = document.getElementById(`opt${i}`);
                btn.innerText = options[i];
                btn.dataset.value = options[i];
            }
        }

        function checkAnswer(selectedBtn, index) {
            if (!canAnswer) return;
            canAnswer = false;

            const selectedValue = parseInt(selectedBtn.dataset.value);
            
            if (selectedValue === currentCorrectAnswer) {
                selectedBtn.classList.add('correct');
                correctAnswersCount++;
                document.getElementById('score-counter').innerText = correctAnswersCount;
            } else {
                selectedBtn.classList.add('wrong');
                // Näita, milline oli õige
                for(let i=0; i<4; i++) {
                    const btn = document.getElementById(`opt${i}`);
                    if (parseInt(btn.dataset.value) === currentCorrectAnswer) {
                        btn.classList.add('correct');
                    }
                }
            }

            setTimeout(() => {
                if (currentQuestion < TOTAL_QUESTIONS) {
                    nextQuestion();
                } else {
                    endGame();
                }
            }, 700); // 0.7 sekundit pausi enne uut küsimust, et näha tagasisidet
        }

        function endGame() {
            clearInterval(timerInterval);
            const endTime = (performance.now() - startTime) / 1000;
            
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            
            document.getElementById('end-score-text').innerText = `Õigeid vastuseid: ${correctAnswersCount} / ${TOTAL_QUESTIONS}`;
            document.getElementById('end-time-text').innerText = `Aeg: ${endTime.toFixed(1)} sekundit`;

            const percentage = (correctAnswersCount / TOTAL_QUESTIONS) * 100;
            const badge = document.getElementById('badge');
            const recordMsg = document.getElementById('new-record-msg');
            recordMsg.classList.add('hidden');

            if (percentage === 100) {
                badge.innerText = "🏆";
                // Kontrolli ja salvesta tippskoor (ainult kui sai 100% täis)
                const previousRecord = localStorage.getItem('mathSprintHighScore');
                if (!previousRecord || endTime < parseFloat(previousRecord)) {
                    localStorage.setItem('mathSprintHighScore', endTime);
                    recordMsg.classList.remove('hidden');
                }
            } else if (percentage >= 80) {
                badge.innerText = "⭐";
            } else if (percentage >= 50) {
                badge.innerText = "👍";
            } else {
                badge.innerText = "💪";
            }
            
            showGlobalHighScore();
        }
    </script>
</body>
</html>
